name: Deploy → hub.jonaspacheco.cloud

on:
  push:
    branches: [main]
    paths: ['hub/**']

jobs:
  deploy:
    name: Build & Deploy Hub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd hub/frontend
          npm ci --silent
          npm run build

      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy backend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no" \
            --exclude='node_modules/' \
            --exclude='.env' \
            hub/backend/ \
            root@${VPS_HOST}:/var/www/hub.jonaspacheco.cloud/backend/

      - name: Deploy frontend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no" \
            hub/frontend/dist/ \
            root@${VPS_HOST}:/var/www/hub.jonaspacheco.cloud/frontend/

      - name: Restart PM2 + npm install
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no root@${VPS_HOST} \
            "cd /var/www/hub.jonaspacheco.cloud/backend && npm install --omit=dev --silent && pm2 restart hub-api || pm2 start src/index.js --name hub-api"
