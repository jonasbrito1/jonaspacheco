name: Deploy → jonaspacheco.cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy via rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          VPS_USER=$(echo "$VPS_USER" | tr -d '[:space:]')
          VPS_PATH=$(echo "$VPS_PATH" | tr -d '[:space:]')
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.claude' \
            --exclude='backend/' \
            --exclude='deploy/' \
            --exclude='node_modules/' \
            --exclude='deploy.sh' \
            --exclude='docker*' \
            --exclude='*.md' \
            --exclude='test-css.html' \
            --exclude='logos.html' \
            ./ \
            ${VPS_USER}@${VPS_HOST}:${VPS_PATH}/

      - name: Verificar deploy
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://jonaspacheco.cloud)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deploy concluído! Site respondendo com HTTP $STATUS"
          else
            echo "⚠️ Site respondeu com HTTP $STATUS"
          fi
