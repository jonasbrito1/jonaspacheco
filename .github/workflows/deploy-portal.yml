name: Deploy → suporte.jonaspacheco.cloud

on:
  push:
    branches: [main]
    paths: ['hub/portal/**', 'hub/backend/**']

jobs:
  deploy:
    name: Build & Deploy Portal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build portal frontend
        run: |
          cd hub/portal
          npm ci --silent
          npm run build

      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy portal frontend
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no" \
            hub/portal/dist/ \
            root@${VPS_HOST}:/var/www/suporte.jonaspacheco.cloud/

      - name: Restart hub-api (backend compartilhado)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          VPS_PORT=$(echo "$VPS_PORT" | tr -d '[:space:]')
          ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=no root@${VPS_HOST} \
            "cd /var/www/hub.jonaspacheco.cloud/backend && npm install --omit=dev --silent && pm2 restart hub-api"
