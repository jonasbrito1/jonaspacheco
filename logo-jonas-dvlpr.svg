<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (opcional - remover para transparente) -->
  <rect width="400" height="120" fill="#0a0a0a" rx="8"/>

  <!-- Sombra/Glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bracket esquerdo -->
  <text x="50" y="75" font-family="'Fira Code', monospace" font-size="48" font-weight="700" fill="#00d4ff" filter="url(#glow)">&lt;</text>

  <!-- Texto principal com gradiente -->
  <text x="80" y="75" font-family="'Fira Code', monospace" font-size="48" font-weight="700" fill="url(#gradient)" filter="url(#glow)">jonas.dvlpr</text>

  <!-- Bracket direito -->
  <text x="350" y="75" font-family="'Fira Code', monospace" font-size="48" font-weight="700" fill="#00d4ff" filter="url(#glow)">/&gt;</text>
</svg>
