<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo quadrada para ícone/avatar -->

  <!-- Background circular -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gradient)" stroke-width="3"/>

  <!-- Sombra/Glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brackets maiores -->
  <text x="35" y="125" font-family="'Fira Code', monospace" font-size="80" font-weight="700" fill="#00d4ff" filter="url(#glow)">&lt;</text>
  <text x="135" y="125" font-family="'Fira Code', monospace" font-size="80" font-weight="700" fill="#00d4ff" filter="url(#glow)">/&gt;</text>

  <!-- Letras JD no centro -->
  <text x="65" y="125" font-family="'Fira Code', monospace" font-size="70" font-weight="700" fill="url(#gradient)" filter="url(#glow)">JD</text>
</svg>
